<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PANDA Music</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

header {
    background: #181818;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    color: #1db954;
}

.container {
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 300px;
    background: #121212;
    overflow-y: auto;
    border-right: 1px solid #333;
}

.search {
    padding: 10px;
}

.search input {
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 5px;
}

.song {
    padding: 10px;
    border-bottom: 1px solid #222;
    cursor: pointer;
}

.song:hover {
    background: #1db954;
    color: black;
}

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.player {
    background: #181818;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

audio {
    width: 300px;
}
</style>
</head>
<body>

<header>PANDA MUSIC 🎵</header>

<div class="container">

    <div class="sidebar">
        <div class="search">
            <input type="text" id="search" placeholder="Search song...">
        </div>
        <div id="songList"></div>
    </div>

    <div class="main">
        <div class="player">
            <h2 id="title">Select a song</h2>
            <audio id="audio" controls></audio>
        </div>
    </div>

</div>

<script>
// Generate 1000 songs (English + Mandarin Hits)
const songs = [];

const englishHits = ["Shape of You", "Blinding Lights", "Perfect", "Stay", "Levitating"];
const mandarinHits = ["告白气球", "演员", "光年之外", "体面", "平凡之路"];

for (let i = 1; i <= 1000; i++) {
    if (i % 2 === 0) {
        let name = mandarinHits[i % mandarinHits.length] + " #" + i;
        songs.push({
            title: name,
            url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
        });
    } else {
        let name = englishHits[i % englishHits.length] + " #" + i;
        songs.push({
            title: name,
            url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
        });
    }
}

const songList = document.getElementById("songList");
const audio = document.getElementById("audio");
const title = document.getElementById("title");

function loadSongs(list) {
    songList.innerHTML = "";
    list.forEach((song, index) => {
        let div = document.createElement("div");
        div.className = "song";
        div.textContent = song.title;
        div.onclick = () => {
            audio.src = song.url;
            title.textContent = song.title;
            audio.play();
        };
        songList.appendChild(div);
    });
}

loadSongs(songs);

// Search feature
document.getElementById("search").addEventListener("input", function(e) {
    let value = e.target.value.toLowerCase();
    let filtered = songs.filter(s => s.title.toLowerCase().includes(value));
    loadSongs(filtered);
});
</script>

</body>
</html>
