<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PANDA Music</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#121212;
color:white;
overflow-x:hidden;
}

.container{
display:flex;
height:100vh;
}

.sidebar{
width:240px;
background:#000;
padding:20px;
}

.logo{
font-size:35px;
font-weight:bold;
color:#1DB954;
margin-bottom:30px;
}

.menu a{
display:block;
color:#aaa;
text-decoration:none;
margin:15px 0;
transition:.3s;
}

.menu a:hover{
color:white;
}

.main{
flex:1;
padding:20px;
overflow:auto;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.search{
width:300px;
padding:12px;
border:none;
border-radius:30px;
outline:none;
}

.region{
padding:12px;
border:none;
border-radius:10px;
background:#1DB954;
color:white;
font-weight:bold;
}

.song-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.card{
background:#181818;
padding:15px;
border-radius:15px;
cursor:pointer;
transition:.3s;
}

.card:hover{
background:#282828;
transform:scale(1.03);
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

.title{
font-size:16px;
font-weight:bold;
}

.artist{
font-size:14px;
color:#aaa;
margin-top:5px;
}

.player{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#181818;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-top:1px solid #333;
}

.player-info{
display:flex;
align-items:center;
gap:15px;
}

.player-info img{
width:60px;
height:60px;
border-radius:10px;
}

.controls button{
background:#1DB954;
border:none;
padding:12px;
border-radius:50%;
margin:0 5px;
cursor:pointer;
font-size:16px;
color:white;
}

.controls button:hover{
background:#17a74a;
}

audio{
width:300px;
}

@media(max-width:768px){

.sidebar{
display:none;
}

.search{
width:180px;
}

.player{
flex-direction:column;
gap:10px;
}

audio{
width:100%;
}

}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<div class="logo">🐼 PANDA</div>

<div class="menu">
<a href="#">🏠 Home</a>
<a href="#">🔥 Trending</a>
<a href="#">🎵 Playlist</a>
<a href="#">🌍 Region</a>
<a href="#">❤️ Favorite</a>
</div>
</div>

<div class="main">

<div class="top">
<input type="text" class="search" id="search" placeholder="Cari lagu...">

<select class="region" id="region">
<option value="us">USA</option>
<option value="id">Indonesia</option>
<option value="jp">Japan</option>
<option value="kr">Korea</option>
<option value="gb">UK</option>
</select>
</div>

<h2>🔥 Random Hit Songs</h2>
<br>

<div class="song-grid" id="songs"></div>

</div>
</div>

<div class="player">

<div class="player-info">
<img id="cover" src="https://via.placeholder.com/60">

<div>
<div id="songTitle">No song selected</div>
<div id="songArtist" style="color:#aaa"></div>
</div>
</div>

<div class="controls">
<button onclick="prevSong()">⏮</button>
<button onclick="togglePlay()">▶</button>
<button onclick="nextSong()">⏭</button>
</div>

<audio id="audio" controls></audio>

</div>

<script>

const songsDiv=document.getElementById('songs');
const audio=document.getElementById('audio');
const title=document.getElementById('songTitle');
const artist=document.getElementById('songArtist');
const cover=document.getElementById('cover');
const search=document.getElementById('search');
const region=document.getElementById('region');

let songs=[];
let current=0;

async function loadSongs(country='us'){

songsDiv.innerHTML='<h3>Loading...</h3>';

const keywords=[
'hits',
'viral',
'pop',
'rock',
'dance',
'party',
'love',
'trend',
'music',
'top'
];

const random=
keywords[Math.floor(Math.random()*keywords.length)];

const url=
`https://itunes.apple.com/search?term=${random}&media=music&limit=50&country=${country}`;

const res=await fetch(url);
const data=await res.json();

songs=data.results;

renderSongs(songs);

}

function renderSongs(data){

songsDiv.innerHTML='';

data.forEach((song,index)=>{

const card=document.createElement('div');
card.className='card';

card.innerHTML=`
<img src="${song.artworkUrl100}">
<div class="title">${song.trackName}</div>
<div class="artist">${song.artistName}</div>
`;

card.onclick=()=>playSong(index);

songsDiv.appendChild(card);

});

}

function playSong(index){

current=index;

const song=songs[index];

audio.src=song.previewUrl;
audio.play();

title.innerText=song.trackName;
artist.innerText=song.artistName;
cover.src=song.artworkUrl100;

}

function nextSong(){

current++;

if(current>=songs.length){
current=0;
}

playSong(current);

}

function prevSong(){

current--;

if(current<0){
current=songs.length-1;
}

playSong(current);

}

function togglePlay(){

if(audio.paused){
audio.play();
}else{
audio.pause();
}

}

audio.addEventListener('ended',()=>{
nextSong();
});

search.addEventListener('input',()=>{

const value=search.value.toLowerCase();

const filtered=songs.filter(song=>
song.trackName.toLowerCase().includes(value) ||
song.artistName.toLowerCase().includes(value)
);

renderSongs(filtered);

});

region.addEventListener('change',()=>{
loadSongs(region.value);
});

loadSongs();

</script>

</body>
</html>
