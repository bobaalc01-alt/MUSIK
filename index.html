<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PANDA Spotify Clone</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0f1c;
  color: white;
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #0f172a;
  padding: 15px;
  display: flex;
  flex-direction: column;
}

.logo {
  font-size: 20px;
  margin-bottom: 20px;
}

.menu button {
  background: none;
  color: white;
  border: none;
  text-align: left;
  padding: 10px;
  cursor: pointer;
}

.menu button:hover {
  background: #1e293b;
  border-radius: 8px;
}

/* MAIN */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.topbar {
  padding: 10px;
  display: flex;
  gap: 10px;
  background: #111827;
}

.topbar input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.topbar button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.content {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
}

/* CARD */
.card {
  background: #1f2937;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
}

.card p {
  font-size: 12px;
  padding: 5px;
}

/* PLAYER */
.player {
  height: 90px;
  background: #0f172a;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px;
}

iframe {
  width: 200px;
  height: 80px;
}

.controls button {
  margin: 5px;
  padding: 8px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

/* MOBILE */
@media(max-width: 768px){
  .sidebar { display:none; }
  iframe { width: 140px; }
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">🐼 PANDA</div>

  <div class="menu">
    <button onclick="setQuery('english songs')">🎵 English</button>
    <button onclick="setQuery('mandarin songs')">🎵 Mandarin</button>
    <button onclick="showFav()">❤️ Favorites</button>
  </div>
</div>

<div class="main">

  <div class="topbar">
    <input id="query" placeholder="Search music..." />
    <button onclick="search()">Search</button>
  </div>

  <div class="content" id="results"></div>

  <div class="player">
    <div class="controls">
      <button onclick="prev()">⏮</button>
      <button onclick="next()">⏭</button>
      <button onclick="toggleFav()">❤️</button>
    </div>

    <div id="player"></div>
  </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const API_KEY = "YOUR_YOUTUBE_API_KEY";

let player;
let queue = [];
let index = 0;
let favorites = JSON.parse(localStorage.getItem("fav") || "[]");

function onYouTubeIframeAPIReady(){
  player = new YT.Player("player", {
    videoId: "",
    playerVars: {
      autoplay: 1,
      mute: 1,
      controls: 1
    },
    events: {
      onStateChange: e => {
        if(e.data === YT.PlayerState.ENDED){
          next();
        }
      }
    }
  });
}

/* SEARCH */
async function search(){
  const q = document.getElementById("query").value;

  const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=12&q=${encodeURIComponent(q)}&key=${API_KEY}`;

  const res = await fetch(url);
  const data = await res.json();

  render(data.items);
}

/* RENDER */
function render(items){
  const box = document.getElementById("results");
  box.innerHTML = "";

  queue = items.map(v => v.id.videoId);

  items.forEach(v => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${v.snippet.thumbnails.medium.url}" />
      <p>${v.snippet.title}</p>
    `;

    div.onclick = () => play(v.id.videoId);
    box.appendChild(div);
  });
}

/* PLAY */
function play(id){
  index = queue.indexOf(id);
  player.loadVideoById(id);
  player.mute();
}

/* NEXT / PREV */
function next(){
  if(index < queue.length - 1){
    index++;
    play(queue[index]);
  }
}

function prev(){
  if(index > 0){
    index--;
    play(queue[index]);
  }
}

/* FAVORITES */
function toggleFav(){
  const id = queue[index];
  if(!favorites.includes(id)){
    favorites.push(id);
  } else {
    favorites = favorites.filter(v => v !== id);
  }
  localStorage.setItem("fav", JSON.stringify(favorites));
}

function showFav(){
  render(favorites.map(id => ({
    id: {videoId:id},
    snippet: {title:"❤️ Favorite", thumbnails:{medium:{url:"https://img.youtube.com/vi/"+id+"/mqdefault.jpg"}}}
  })));
}

/* QUICK SEARCH */
function setQuery(q){
  document.getElementById("query").value = q;
  search();
}
</script>

</body>
</html>
