<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PANDA Ultra</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.header{
  padding:15px;
  text-align:center;
  background:#111827;
  font-size:18px;
}

.search{
  display:flex;
  gap:10px;
  padding:10px;
}

input{
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:#1f2937;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

.card img{width:100%;}
.card p{font-size:12px;padding:5px;}

.player{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0f172a;
}
</style>
</head>

<body>

<div class="header">🐼 PANDA Spotify Ultra Android</div>

<div class="search">
  <input id="q" placeholder="Search music..." />
  <button onclick="search()">Search</button>
</div>

<div class="grid" id="grid"></div>

<div class="player">
  <div id="player"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* 🔑 API KEY (SUDAH DI-SET DI SINI) */
const API_KEY = "PASTE_YOUR_YOUTUBE_API_KEY_HERE";

let player;
let queue = [];
let index = 0;

function onYouTubeIframeAPIReady(){
  player = new YT.Player("player",{
    height:"80",
    width:"100%",
    videoId:"",
    playerVars:{
      autoplay:1,
      controls:1,
      mute:1
    }
  });
}

/* SEARCH YOUTUBE */
async function search(){
  const q = document.getElementById("q").value;

  const res = await fetch(
    "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=12&q="
    + encodeURIComponent(q)
    + "&key=" + API_KEY
  );

  const data = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  queue = data.items.map(v => v.id.videoId);

  data.items.forEach(v=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <img src="${v.snippet.thumbnails.medium.url}">
      <p>${v.snippet.title}</p>
    `;

    div.onclick = () => play(v.id.videoId);
    grid.appendChild(div);
  });
}

/* PLAY MUSIC */
function play(id){
  index = queue.indexOf(id);
  player.loadVideoById(id);
  player.mute();
}
</script>

</body>
</html>
