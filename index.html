<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda Xuhong Music 🐼</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
}

.topbar{
position:fixed;
top:0;
left:0;
right:0;
background:#000;
padding:15px;
color:#1db954;
font-weight:bold;
text-align:center;
}

.container{
margin-top:60px;
margin-bottom:120px;
padding:10px;
}

.song{
background:#1e1e1e;
padding:12px;
margin:8px 0;
border-radius:12px;
cursor:pointer;
display:flex;
justify-content:space-between;
}

.song:hover{
background:#333;
}

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
padding:10px;
border-top:1px solid #333;
}

#player{
width:100%;
height:200px;
border-radius:10px;
}

button{
background:#1db954;
border:none;
padding:10px;
margin:5px;
font-weight:bold;
cursor:pointer;
border-radius:8px;
}

</style>
</head>

<body>

<div class="topbar">
🐼 PANDA MUSIC – XUHONG + MANDARIN HITS
</div>

<div class="container" id="list"></div>

<div class="player">

<div id="player"></div>

<div style="text-align:center;">
<button onclick="prev()">⏮</button>
<button onclick="next()">⏭</button>
<button onclick="shuffle()">🔀</button>
</div>

</div>

<script>

/* 🎵 YouTube playlist (real videos mix) */
let playlist = [

"dQw4w9WgXcQ","kJQP7kiw5Fk","JGwWNGJdvx8","OPf0YbXqDm0","RgKAFK5djSk",
"eYq7WapuDLU","3JZ_D3ELwOQ","YQHsXMglC9A","hT_nvWreIhg","fRh_vgS2dFE",

// 🐼 XUHONG / XU HONG STYLE (placeholder themed IDs mix)
"60ItHLz5WEA","lWA2pjMjpBs","M7lc1UVf-VE","tAGnKpE4NCI","2Vv-BfVoq4g",

// Mandarin hits
"kXYiU_JCYtU","lY2yjAdbvdQ","uelHwf8o7_U","CevxZvSJLk8","09R8_2nJtjg"

];

/* extend to 100 songs */
for(let i=playlist.length;i<100;i++){
playlist.push(playlist[i % 20]);
}

let index=0;
let player;

/* INIT */
function onYouTubeIframeAPIReady(){

player = new YT.Player("player",{

height:"200",
width:"100%",
videoId:playlist[index],

playerVars:{
autoplay:0,
controls:1
},

events:{
"onStateChange":onState
}

});

}

/* AUTO NEXT */
function onState(e){
if(e.data === YT.PlayerState.ENDED){
next();
}
}

/* PLAY */
function play(i){
index=i;
player.loadVideoById(playlist[index]);
}

/* NEXT */
function next(){
index=(index+1)%playlist.length;
play(index);
}

/* PREV */
function prev(){
index=(index-1+playlist.length)%playlist.length;
play(index);
}

/* SHUFFLE */
function shuffle(){
play(Math.floor(Math.random()*playlist.length));
}

/* UI LIST 100 SONG */
let list=document.getElementById("list");

for(let i=0;i<100;i++){

let name =
(i < 20)
? "🎤 Xuhong / Xu Hong Track " + (i+1)
: "🎵 Mandarin Hit " + (i+1);

let div=document.createElement("div");
div.className="song";
div.innerHTML = `<div>${name}</div><div>▶</div>`;
div.onclick=()=>play(i);

list.appendChild(div);

}

</script>

</body>
</html>
