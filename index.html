<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Music Player</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121212;
      color: white;
    }

    header {
      padding: 15px;
      background: #1f1f1f;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      display: flex;
      height: calc(100vh - 60px);
    }

    .playlist {
      width: 30%;
      background: #181818;
      overflow-y: auto;
      padding: 10px;
    }

    .song {
      padding: 12px;
      margin: 8px 0;
      background: #2a2a2a;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .song:hover {
      background: #3a3a3a;
    }

    .player {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .cover {
      width: 250px;
      height: 250px;
      background: #333;
      border-radius: 15px;
      margin-bottom: 20px;
      background-size: cover;
      background-position: center;
    }

    audio {
      width: 80%;
      outline: none;
    }

    .title {
      margin-bottom: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<header>🎵 My Music Player (No Ads)</header>

<div class="container">

  <!-- Playlist -->
  <div class="playlist">
    <div class="song" onclick="playSong(0)">Lagu 1 - Artist A</div>
    <div class="song" onclick="playSong(1)">Lagu 2 - Artist B</div>
    <div class="song" onclick="playSong(2)">Lagu 3 - Artist C</div>
  </div>

  <!-- Player -->
  <div class="player">
    <div class="cover" id="cover"></div>
    <div class="title" id="title">Pilih lagu</div>

    <audio id="audio" controls>
      <source id="source" src="" type="audio/mp3">
      Browser tidak support audio.
    </audio>
  </div>

</div>

<script>
  const songs = [
    {
      title: "Lagu 1 - Artist A",
      file: "music/song1.mp3",
      cover: "https://picsum.photos/300?1"
    },
    {
      title: "Lagu 2 - Artist B",
      file: "music/song2.mp3",
      cover: "https://picsum.photos/300?2"
    },
    {
      title: "Lagu 3 - Artist C",
      file: "music/song3.mp3",
      cover: "https://picsum.photos/300?3"
    }
  ];

  function playSong(index) {
    const audio = document.getElementById("audio");
    const source = document.getElementById("source");
    const title = document.getElementById("title");
    const cover = document.getElementById("cover");

    source.src = songs[index].file;
    audio.load();
    audio.play();

    title.innerText = songs[index].title;
    cover.style.backgroundImage = `url(${songs[index].cover})`;
  }
</script>

</body>
</html>
