<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Player Simple</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: #181818;
    }

    header input {
      width: 40%;
      padding: 8px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    .container {
      display: flex;
    }

    .main {
      flex: 3;
      padding: 20px;
    }

    .sidebar {
      flex: 1;
      padding: 20px;
      background: #181818;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }

    .video-box {
      background: black;
      border-radius: 10px;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 420px;
      border: none;
    }

    .video-item {
      margin-bottom: 15px;
      cursor: pointer;
      padding: 10px;
      background: #222;
      border-radius: 8px;
    }

    .video-item:hover {
      background: #333;
    }
  </style>
</head>

<body>

<header>
  <div><b>MyVideo</b></div>
  <input type="text" placeholder="Cari video...">
  <div>User</div>
</header>

<div class="container">

  <div class="main">
    <div class="video-box">
      <iframe 
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        allowfullscreen>
      </iframe>
    </div>

    <h3>Judul Video</h3>
    <p>Deskripsi video sederhana di sini.</p>
  </div>

  <div class="sidebar">
    <div class="video-item">Rekomendasi Video 1</div>
    <div class="video-item">Rekomendasi Video 2</div>
    <div class="video-item">Rekomendasi Video 3</div>
    <div class="video-item">Rekomendasi Video 4</div>
  </div>

</div>

</body>
</html>
