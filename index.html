<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VideoGo</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#111;
      color:white;
    }

    header{
      background:#ff0000;
      padding:15px;
      text-align:center;
      font-size:22px;
      font-weight:bold;
    }

    .search-box{
      padding:10px;
      background:#1b1b1b;
    }

    .search-box input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      outline:none;
      font-size:16px;
    }

    .video-list{
      padding:10px;
    }

    .video-card{
      background:#1d1d1d;
      margin-bottom:15px;
      border-radius:10px;
      overflow:hidden;
    }

    .thumbnail{
      width:100%;
      height:200px;
      object-fit:cover;
    }

    .video-info{
      padding:10px;
    }

    .video-title{
      font-size:18px;
      margin-bottom:8px;
    }

    .video-actions{
      display:flex;
      justify-content:space-between;
      margin-top:10px;
    }

    button{
      background:#ff0000;
      color:white;
      border:none;
      padding:10px 15px;
      border-radius:6px;
      cursor:pointer;
    }

    button:hover{
      background:#cc0000;
    }

    .player-container{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:black;
      z-index:999;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    video{
      width:100%;
      max-height:80%;
    }

    .close-btn{
      margin-top:20px;
    }
  </style>
</head>
<body>

<header>
  VideoGo
</header>

<div class="search-box">
  <input type="text" placeholder="Cari video...">
</div>

<div class="video-list">

  <div class="video-card">
    <img 
      class="thumbnail"
      src="https://picsum.photos/500/300"
      alt="thumbnail"
    >

    <div class="video-info">
      <div class="video-title">
        Sample Video 1
      </div>

      <small>Hemat data • 360p</small>

      <div class="video-actions">
        <button onclick="playVideo('sample.mp4')">
          Putar
        </button>

        <button onclick="downloadVideo('sample.mp4')">
          Download
        </button>
      </div>
    </div>
  </div>

  <div class="video-card">
    <img 
      class="thumbnail"
      src="https://picsum.photos/500/301"
      alt="thumbnail"
    >

    <div class="video-info">
      <div class="video-title">
        Sample Video 2
      </div>

      <small>Mode offline • 240p</small>

      <div class="video-actions">
        <button onclick="playVideo('sample2.mp4')">
          Putar
        </button>

        <button onclick="downloadVideo('sample2.mp4')">
          Download
        </button>
      </div>
    </div>
  </div>

</div>

<div class="player-container" id="playerContainer">

  <video id="videoPlayer" controls>
    <source id="videoSource" src="" type="video/mp4">
  </video>

  <button class="close-btn" onclick="closePlayer()">
    Tutup
  </button>

</div>

<script>

  function playVideo(videoUrl){

    const playerContainer =
      document.getElementById('playerContainer');

    const videoPlayer =
      document.getElementById('videoPlayer');

    const videoSource =
      document.getElementById('videoSource');

    videoSource.src = videoUrl;

    videoPlayer.load();
    videoPlayer.play();

    playerContainer.style.display = 'flex';
  }

  function closePlayer(){

    const playerContainer =
      document.getElementById('playerContainer');

    const videoPlayer =
      document.getElementById('videoPlayer');

    videoPlayer.pause();

    playerContainer.style.display = 'none';
  }

  function downloadVideo(url){

    const a = document.createElement('a');

    a.href = url;
    a.download = url;

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);
  }

</script>

</body>
</html>
