<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Panda 🐼</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a0a0a;
    color:white;
    display:flex;
}

/* SIDEBAR PANDA */
.sidebar{
    width:220px;
    background:#000;
    border-right:1px solid #222;
    padding:15px;
}

.logo{
    font-size:20px;
    font-weight:bold;
    color:white;
}

.logo span{
    color:#00ff88;
}

.menu{
    margin:10px 0;
    color:#aaa;
    cursor:pointer;
    font-size:14px;
}

.menu:hover{
    color:white;
}

/* MAIN */
.main{
    flex:1;
    padding:15px;
}

h2{
    color:#00ff88;
}

/* SEARCH */
input{
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#111;
    border:1px solid #333;
    color:white;
    border-radius:8px;
}

/* SONG */
.song{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    margin:6px 0;
    background:#121212;
    border:1px solid #222;
    border-radius:8px;
    cursor:pointer;
}

.song:hover{
    background:#1a1a1a;
}

.badge{
    font-size:10px;
    padding:3px 6px;
    background:#00ff88;
    color:black;
    border-radius:5px;
}

/* PLAYER */
.player{
    position:fixed;
    bottom:0;
    left:220px;
    right:0;
    background:#000;
    border-top:1px solid #222;
    padding:10px;
}

button{
    padding:8px;
    margin:2px;
    border:none;
    background:#00ff88;
    font-weight:bold;
    cursor:pointer;
    border-radius:6px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">🐼 Spotify <span>Panda</span></div>

    <div class="menu">🏠 Home</div>
    <div class="menu">🔥 Trending</div>
    <div class="menu">🎵 Playlist</div>
    <div class="menu">🐼 Panda Mood</div>
</div>

<input id="search" placeholder="Cari lagu..." onkeyup="render()">

<!-- PLAYER -->
<div class="player">

<audio id="audio" controls style="width:100%"></audio>

<div>
    <button onclick="prev()">⏮</button>
    <button onclick="toggle()">▶/⏸</button>
    <button onclick="next()">⏭</button>

];

let index = 0;

function save(){
    localStorage.setItem("panda",JSON.stringify(songs));
}

// 🎧 PLAY
function play(i){
    index = i;
    let s = songs[i];

    let audio = document.getElementById("audio");
    audio.src = s.url;
    audio.play();

    document.getElementById("now").innerText =
        "🐼 Now Playing: " + s.title + " - " + s.artist;
}

// ▶/⏸
function toggle(){
    let a = document.getElementById("audio");
    a.paused ? a.play() : a.pause();
}

// NEXT
function next(){
    index = (index + 1) % songs.length;
    play(index);
}

// PREV
function prev(){
    index = (index - 1 + songs.length) % songs.length;
    play(index);
}

// 🔎 RENDER
function render(){

    let list = document.getElementById("list");
    let search = document.getElementById("search").value.toLowerCase();

    list.innerHTML = "";

    songs.forEach((s,i)=>{

        if(
            s.title.toLowerCase().includes(search) ||
            s.artist.toLowerCase().includes(search)
        ){

            let div = document.createElement("div");
            div.className = "song";

            div.innerHTML = `
                <div onclick="play(${i})">
                    🎵 ${s.title} - ${s.artist}
                    <span class="badge">${s.cat}</span>
                </div>
                <div>🐼</div>
            `;

            list.appendChild(div);
        }
    });
}

render();

</script>

</body>
