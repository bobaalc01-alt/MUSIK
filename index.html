<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda Music Pro Max 🐼</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
}

/* TOP APP BAR */
.topbar{
background:#000;
padding:15px;
font-size:18px;
font-weight:bold;
color:#1db954;
position:fixed;
top:0;
left:0;
right:0;
z-index:10;
}

/* MAIN LIST */
.container{
margin-top:60px;
margin-bottom:120px;
padding:10px;
}

.song{
background:#1e1e1e;
padding:12px;
margin:8px 0;
border-radius:12px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.song:hover{
background:#333;
}

/* PLAYER BOTTOM MOBILE */
.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
padding:10px;
border-top:1px solid #333;
}

#player{
width:100%;
height:200px;
border-radius:10px;
overflow:hidden;
}

/* BUTTON */
.controls{
display:flex;
justify-content:center;
gap:10px;
margin-top:8px;
}

button{
background:#1db954;
border:none;
padding:10px 14px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* MOBILE STYLE */
@media(max-width:600px){

.song{
font-size:14px;
}

}

</style>
</head>

<body>

<div class="topbar">
🐼 Panda Music Pro Max
</div>

<div class="container" id="list"></div>

<div class="player">

<div id="player"></div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="next()">⏭</button>
<button onclick="shuffle()">🔀</button>
</div>

</div>

<script>

/* 🎵 100 YOUTUBE VIDEO ID */
let playlist = [
"dQw4w9WgXcQ","kJQP7kiw5Fk","JGwWNGJdvx8","OPf0YbXqDm0","RgKAFK5djSk",
"eYq7WapuDLU","3JZ_D3ELwOQ","YQHsXMglC9A","hT_nvWreIhg","fRh_vgS2dFE"
];

for(let i=playlist.length;i<100;i++){
playlist.push(playlist[i % 10]);
}

let index=0;
let player;

/* INIT YOUTUBE */
function onYouTubeIframeAPIReady(){

player = new YT.Player("player",{

height:"200",
width:"100%",
videoId:playlist[index],

playerVars:{
"autoplay":0,
"controls":1
},

events:{
"onStateChange":onStateChange
}

});

}

/* AUTO NEXT */
function onStateChange(e){
if(e.data === YT.PlayerState.ENDED){
next();
}
}

/* PLAY */
function play(i){
index=i;
player.loadVideoById(playlist[index]);
}

/* NEXT */
function next(){
index=(index+1)%playlist.length;
play(index);
}

/* PREV */
function prev(){
index=(index-1+playlist.length)%playlist.length;
play(index);
}

/* SHUFFLE */
function shuffle(){
play(Math.floor(Math.random()*playlist.length));
}

/* RENDER LIST (100 SONG UI) */
let list=document.getElementById("list");

for(let i=0;i<100;i++){

let div=document.createElement("div");

div.className="song";

div.innerHTML=`
<div>🎵 Lagu Panda ${i+1}</div>
<div>▶</div>
`;

div.onclick=()=>play(i);

list.appendChild(div);

}

</script>

</body>
</html>
