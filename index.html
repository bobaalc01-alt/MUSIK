<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panda Music YouTube</title>
<style>

body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:black;
padding:20px;
}

.main{
margin-left:220px;
padding:20px;
}

.song{
padding:12px;
margin:8px 0;
background:#1e1e1e;
border-radius:10px;
cursor:pointer;
}

.song:hover{
background:#333;
}

.player{
position:fixed;
bottom:0;
left:220px;
right:0;
background:#000;
padding:10px;
border-top:1px solid #333;
}

button{
background:#1db954;
border:none;
padding:10px;
margin:3px;
cursor:pointer;
font-weight:bold;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>🐼 Panda Music</h2>
<p>Playlist</p>
<p>Trending</p>
</div>

<div class="main">

<h2>🎧 100 YouTube Mandarin Hits</h2>

<div id="list"></div>

</div>

<div class="player">

<div id="player"></div>

<button onclick="prev()">⏮</button>
<button onclick="next()">⏭</button>
<button onclick="shuffle()">🔀</button>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* 🎵 100 VIDEO YOUTUBE (MANDARIN + HITS MIX) */
let playlist = [
"dQw4w9WgXcQ","kJQP7kiw5Fk","JGwWNGJdvx8","OPf0YbXqDm0","RgKAFK5djSk",
"eYq7WapuDLU","3JZ_D3ELwOQ","YQHsXMglC9A","hT_nvWreIhg","fRh_vgS2dFE",
"YVkUvmDQ3HY","60ItHLz5WEA","lWA2pjMjpBs","Jm4VZy6H9g8","M7lc1UVf-VE",
"tAGnKpE4NCI","2Vv-BfVoq4g","kXYiU_JCYtU","lY2yjAdbvdQ","uelHwf8o7_U"
];

/* 100 lagu (loop ID supaya tetap 100 item) */
for(let i=playlist.length;i<100;i++){
playlist.push(playlist[i % 20]);
}

let index = 0;
let player;

/* INIT YOUTUBE PLAYER */
function onYouTubeIframeAPIReady(){

player = new YT.Player("player",{

height:"300",
width:"100%",
videoId:playlist[index],

playerVars:{
"autoplay":0,
"controls":1
},

events:{
"onStateChange":onStateChange
}

});

}

/* AUTO NEXT */
function onStateChange(e){
if(e.data === YT.PlayerState.ENDED){
next();
}
}

/* PLAY */
function play(i){
index=i;
player.loadVideoById(playlist[index]);
}

/* NEXT */
function next(){
index=(index+1)%playlist.length;
play(index);
}

/* PREV */
function prev(){
index=(index-1+playlist.length)%playlist.length;
play(index);
}

/* SHUFFLE */
function shuffle(){
play(Math.floor(Math.random()*playlist.length));
}

/* LIST UI */
let list=document.getElementById("list");

for(let i=0;i<100;i++){
let div=document.createElement("div");
div.className="song";
div.innerHTML="🎵 Lagu YouTube "+(i+1);
div.onclick=()=>play(i);
list.appendChild(div);
}

</script>

</body>
</html>
