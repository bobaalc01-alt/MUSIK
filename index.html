<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Panda 🐼</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#121212;
color:white;
overflow:hidden;
}

/* BACKGROUND */

.bg{
position:fixed;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.circle{
position:absolute;
border-radius:50%;
background:#1db95433;
animation:float 12s linear infinite;
}

@keyframes float{
from{
transform:translateY(100vh) scale(0);
}
to{
transform:translateY(-100vh) scale(1.5);
}
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
width:240px;
height:100%;
background:black;
padding:20px;
border-right:1px solid #222;
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:30px;
}

.logo span{
color:#1db954;
}

.menu{
padding:14px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
color:#aaa;
transition:0.3s;
}

.menu:hover{
background:#1a1a1a;
color:white;
}

/* MAIN */

.main{
margin-left:240px;
padding:20px;
height:calc(100vh - 120px);
overflow:auto;
}

.title{
font-size:30px;
margin-bottom:20px;
color:#1db954;
}

.search{
width:100%;
padding:14px;
background:#1a1a1a;
border:none;
border-radius:12px;
color:white;
margin-bottom:20px;
}

/* SONG CARD */

.song{
display:flex;
justify-content:space-between;
align-items:center;
background:#181818;
padding:15px;
margin:10px 0;
border-radius:12px;
transition:0.3s;
cursor:pointer;
}

.song:hover{
background:#282828;
transform:scale(1.01);
}

.song-title{
font-size:16px;
font-weight:bold;
}

.song-artist{
font-size:13px;
color:#aaa;
}

.badge{
background:#1db954;
color:black;
padding:4px 8px;
font-size:10px;
border-radius:8px;
margin-top:5px;
display:inline-block;
}

/* PLAYER */

.player{
position:fixed;
bottom:0;
left:240px;
right:0;
background:#181818;
padding:12px;
border-top:1px solid #333;
}

.now{
font-size:14px;
margin-bottom:10px;
}

.controls{
display:flex;
gap:10px;
margin-top:10px;
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
background:#1db954;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

/* LYRICS */

.lyrics{
margin-top:10px;
color:#1db954;
font-size:14px;
}

/* MOBILE */

@media(max-width:700px){

.sidebar{
width:70px;
}

.logo{
font-size:14px;
}

.menu{
font-size:11px;
padding:8px;
}

.main{
margin-left:70px;
}

.player{
left:70px;
}

}

</style>
</head>
<body>

<!-- BG -->
<div class="bg" id="bg"></div>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">
🐼 Spotify <span>Panda</span>
</div>

<div class="menu">🏠 Home</div>
<div class="menu">🔥 Trending</div>
<div class="menu">🎵 Playlist</div>
<div class="menu">❤️ Favorite</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="title">
🐼 Spotify Panda Mandarin Hits
</div>

<input
class="search"
id="search"
placeholder="Cari lagu mandarin..."
onkeyup="render()"
/>

<div id="list"></div>

</div>

<!-- PLAYER -->
<div class="player">

<div class="now" id="now">
🎧 Tidak ada lagu diputar
</div>

<audio id="audio" controls style="width:100%"></audio>

<div class="controls">

<button onclick="prev()">⏮</button>

<button onclick="toggle()">▶ / ⏸</button>

<button onclick="next()">⏭</button>

<button onclick="shuffle()">🔀 Shuffle</button>

</div>

<div class="lyrics" id="lyrics">
🎤 Lirik karaoke akan tampil di sini...
</div>

</div>

<script>

/* BACKGROUND */

for(let i=0;i<25;i++){

let c=document.createElement("div");

c.className="circle";

c.style.width=Math.random()*150+"px";
c.style.height=c.style.width;

c.style.left=Math.random()*100+"vw";

c.style.animationDuration=
(5+Math.random()*10)+"s";

document.getElementById("bg").appendChild(c);

}

/* DATABASE 100 SONG */

let songs=[];

const demoUrls=[

"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"

];

const mandarinHits=[

"告白气球",
"稻香",
"青花瓷",
"七里香",
"光年之外",
"泡沫",
"那些年",
"大鱼",
"修炼爱情",
"十年",
"富士山下",
"遇见",
"突然好想你",
"年少有为",
"逆战",
"天下",
"达拉崩吧",
"有何不可",
"清明雨上",
"隐形的翅膀"

];

for(let i=0;i<100;i++){

songs.push({

title:mandarinHits[i % mandarinHits.length]+" "+(i+1),

artist:"Mandarin Artist "+(i+1),

cat:"Mandarin",

url:demoUrls[i % demoUrls.length],

lyric:"🎤 Panda Karaoke Lyric "+(i+1)

});

}

/* PLAYER */

let index=0;

/* PLAY */

function play(i){

index=i;

let s=songs[i];

let audio=document.getElementById("audio");

audio.src=s.url;

audio.load();

audio.play()
.then(()=>{

console.log("music play");

})
.catch(err=>{

console.log(err);

alert("Klik tombol play browser");

});

document.getElementById("now").innerHTML=
"🎧 Now Playing: "+s.title+" - "+s.artist;

document.getElementById("lyrics").innerHTML=
s.lyric;

}

/* TOGGLE */

function toggle(){

let a=document.getElementById("audio");

a.paused ? a.play() : a.pause();

}

/* NEXT */

function next(){

index=(index+1)%songs.length;

play(index);

}

/* PREV */

function prev(){

index=(index-1+songs.length)%songs.length;

play(index);

}

/* SHUFFLE */

function shuffle(){

let r=Math.floor(Math.random()*songs.length);

play(r);

}

/* AUTO NEXT */

document.getElementById("audio")
.addEventListener("ended",()=>{

next();

});

/* SEARCH */

function render(){

let list=document.getElementById("list");

let search=document
.getElementById("search")
.value.toLowerCase();

list.innerHTML="";

songs.forEach((s,i)=>{

if(

s.title.toLowerCase().includes(search)
||
s.artist.toLowerCase().includes(search)

){

let div=document.createElement("div");

div.className="song";

div.innerHTML=`

<div onclick="play(${i})">

<div class="song-title">
🎵 ${s.title}
</div>

<div class="song-artist">
${s.artist}
</div>

<div class="badge">
${s.cat}
</div>

</div>

<div>🐼</div>

`;

list.appendChild(div);

}

});

}

render();

</script>

</body>
</html>
