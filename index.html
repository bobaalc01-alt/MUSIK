<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda Music 1000 🎧</title>

<style>
body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
}

.header{
position:fixed;
top:0;
left:0;
right:0;
background:#000;
padding:12px;
text-align:center;
color:#1db954;
font-weight:bold;
}

.container{
display:flex;
margin-top:50px;
}

.list{
width:60%;
height:100vh;
overflow:auto;
padding:10px;
}

.song{
padding:10px;
margin:5px;
background:#1e1e1e;
border-radius:8px;
cursor:pointer;
}

.song:hover{
background:#333;
}

.player{
width:40%;
position:fixed;
right:0;
top:50px;
bottom:0;
background:#000;
padding:10px;
}

video{
width:100%;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#1db954;
border:none;
padding:10px;
margin:3px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🐼 PANDA MUSIC PLAYER (1000 SONGS)</div>

<div class="container">

<div class="list" id="list"></div>

<div class="player">

<video id="video" controls></video>

<input id="search" placeholder="Cari lagu..." onkeyup="render()">

<div>
<button onclick="prev()">⏮</button>
<button onclick="toggle()">▶/⏸</button>
<button onclick="next()">⏭</button>
<button onclick="shuffle()">🔀</button>
</div>

<div id="now">Tidak ada lagu</div>

</div>

</div>

<script>

/* 🎵 TEMPLATE 1000 SONGS */
let baseSongs = [
"Jay Chou - Qing Hua Ci",
"Jay Chou - Dao Xiang",
"Ed Sheeran - Perfect",
"Ed Sheeran - Shape of You",
"Charlie Puth - Attention",
"Billie Eilish - Bad Guy",
"JJ Lin - Jiang Nan",
"G.E.M - Light Years Away"
];

let songs = [];

/* generate 1000 */
for(let i=0;i<1000;i++){
songs.push({
title: baseSongs[i % baseSongs.length] + " #" + (i+1),
url: "https://www.w3schools.com/html/mov_bbb.mp4" // demo video
});
}

let index=0;

function play(i){
index=i;
let v=document.getElementById("video");
v.src=songs[i].url;
v.play();

document.getElementById("now").innerText =
"🎧 Now Playing: "+songs[i].title;
}

function next(){
index=(index+1)%songs.length;
play(index);
}

function prev(){
index=(index-1+songs.length)%songs.length;
play(index);
}

function shuffle(){
play(Math.floor(Math.random()*songs.length));
}

function toggle(){
let v=document.getElementById("video");
v.paused?v.play():v.pause();
}

function render(){
let list=document.getElementById("list");
let search=document.getElementById("search").value.toLowerCase();

list.innerHTML="";

songs.forEach((s,i)=>{
if(s.title.toLowerCase().includes(search)){
let div=document.createElement("div");
div.className="song";
div.innerHTML="🎵 "+s.title;
div.onclick=()=>play(i);
list.appendChild(div);
}
});
}

render();

</script>

</body>
</html>
