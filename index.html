<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PANDA MUSIC</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#000;
    color:white;
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar {
    width:260px;
    background:#0f0f0f;
    padding:15px;
    overflow-y:auto;
}

.logo {
    font-size:22px;
    font-weight:bold;
    color:#1db954;
    margin-bottom:20px;
}

.song {
    padding:10px;
    border-radius:6px;
    cursor:pointer;
    font-size:14px;
}

.song:hover {
    background:#1db954;
    color:black;
}

/* MAIN */
.main {
    flex:1;
    background:#121212;
    display:flex;
    flex-direction:column;
}

/* TOP BAR */
.topbar {
    padding:15px;
    background:#181818;
}

/* CONTENT */
.content {
    flex:1;
    overflow-y:auto;
    padding:20px;
}

/* PLAYER */
.player {
    height:90px;
    background:#181818;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    border-top:1px solid #333;
}

.controls {
    display:flex;
    flex-direction:column;
    width:60%;
}

button {
    background:#1db954;
    border:none;
    padding:8px 12px;
    border-radius:20px;
    cursor:pointer;
}

audio {
    width:100%;
}

.title {
    font-size:14px;
    margin-bottom:5px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="logo">🎧 PANDA</div>
    <div id="list"></div>
</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        Spotify Style Player (PANDA MUSIC)
    </div>

    <div class="content">
        <h2>Playlist</h2>
        <p>English & Mandarin Hits (1000 songs ready)</p>
    </div>

    <!-- PLAYER BOTTOM -->
    <div class="player">
        <div class="controls">
            <div class="title" id="title">No song playing</div>
            <audio id="audio" controls></audio>
        </div>
        <button onclick="nextSong()">Next ▶</button>
    </div>

</div>

<script>

// 🎵 REAL MP3 DATABASE (contoh, kamu bisa expand jadi 1000)
const songs = [];

for (let i = 1; i <= 1000; i++) {
    songs.push({
        title: "PANDA Song " + i,
        url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
    });
}

let currentIndex = 0;

const list = document.getElementById("list");
const audio = document.getElementById("audio");
const title = document.getElementById("title");

// render list
songs.forEach((song, index) => {
    let div = document.createElement("div");
    div.className = "song";
    div.innerText = song.title;

    div.onclick = () => play(index);

    list.appendChild(div);
});

function play(index) {
    currentIndex = index;

    audio.src = songs[index].url;
    title.innerText = songs[index].title;

    audio.play();
}

function nextSong() {
    currentIndex++;
    if (currentIndex >= songs.length) currentIndex = 0;
    play(currentIndex);
}

</script>

</body>
</html>
