<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda Music Player 🐼</title>

<style>
body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
}

.header{
background:#000;
padding:15px;
font-size:20px;
font-weight:bold;
color:#1db954;
text-align:center;
position:fixed;
top:0;
left:0;
right:0;
}

.container{
margin-top:60px;
padding:15px;
margin-bottom:120px;
}

.song{
padding:12px;
margin:8px 0;
background:#1e1e1e;
border-radius:10px;
cursor:pointer;
display:flex;
justify-content:space-between;
}

.song:hover{
background:#333;
}

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#000;
padding:10px;
border-top:1px solid #333;
}

button{
background:#1db954;
border:none;
padding:10px;
margin:3px;
font-weight:bold;
cursor:pointer;
border-radius:8px;
}

#now{
margin-bottom:8px;
}

</style>
</head>

<body>

<div class="header">🐼 PANDA MUSIC PLAYER</div>

<div class="container" id="list"></div>

<div class="player">

<div id="now">Tidak ada lagu diputar</div>

<audio id="audio" controls style="width:100%"></audio>

<div>
<button onclick="prev()">⏮</button>
<button onclick="toggle()">▶ / ⏸</button>
<button onclick="next()">⏭</button>
<button onclick="shuffle()">🔀</button>
</div>

</div>

<script>

/* 🎵 100 LAGU (MIX MANDARIN + HITS + POP) */
const titles = [
"告白气球","稻香","青花瓷","七里香","夜曲",
"光年之外","泡沫","倒带","那些年","大鱼",
"修炼爱情","可惜没如果","江南","十年","富士山下",
"好久不见","浮夸","K歌之王","遇见","天黑黑",
"小幸运","平凡之路","体面","说散就散","后来",
"晴天","简单爱","龙卷风","安静","一路向北",
"说好不哭","等你下课","彩虹","最长的电影","枫",
"借口","世界末日","东风破","七里香2","稻香2",
"演员","年少有为","模特","李白","成全",
"逆战","天下","达拉崩吧","有何不可","清明雨上",
"断桥残雪","玫瑰花的葬礼","城府","星空","知足",
"温柔","突然好想你","倔强","志明与春娇","离开地球表面",
"追光者","岁月神偷","我好想你","你不是真正的快乐","突然之间",
"红豆","传奇","我愿意","容易受伤的女人","棋子",
"爱情转移","最佳损友","明年今日","浮夸2","十年2",
"泡沫2","光年之外2","大鱼2","告白气球2","稻香3",
"小幸运2","平凡之路2","晴天2","后来2","体面2",
"说散就散2","演员2","年少有为2","江南2","富士山下2"
];

/* 🎵 1 AUDIO LINK (DEMO STREAM) */
const musicURL = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";

let songs = [];

/* generate 100 songs */
for(let i=0;i<100;i++){
songs.push({
title: titles[i],
url: musicURL
});
}

let index = 0;

/* PLAY */
function play(i){
index = i;

let s = songs[i];
let audio = document.getElementById("audio");

audio.src = s.url;
audio.load();
audio.play();

document.getElementById("now").innerText =
"🎧 Now Playing: " + s.title;
}

/* NEXT */
function next(){
index = (index + 1) % songs.length;
play(index);
}

/* PREV */
function prev(){
index = (index - 1 + songs.length) % songs.length;
play(index);
}

/* SHUFFLE */
function shuffle(){
play(Math.floor(Math.random() * songs.length));
}

/* TOGGLE */
function toggle(){
let a = document.getElementById("audio");
a.paused ? a.play() : a.pause();
}

/* AUTO NEXT */
document.getElementById("audio").addEventListener("ended", next);

/* RENDER LIST */
let list = document.getElementById("list");

songs.forEach((s,i)=>{
let div = document.createElement("div");
div.className = "song";
div.innerHTML = "🎵 " + s.title;
div.onclick = ()=>play(i);
list.appendChild(div);
});

</script>

</body>
</html>
