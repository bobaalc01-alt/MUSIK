<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PANDA MUSIC</title>

<style>
body {
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f0f0f;
    color:white;
}

header {
    background:#181818;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#1db954;
}

.container {
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar {
    width:320px;
    background:#121212;
    border-right:1px solid #333;
    overflow-y:auto;
}

.searchBox {
    padding:10px;
}

.searchBox input {
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
}

.song {
    padding:10px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.song:hover {
    background:#1db954;
    color:black;
}

/* MAIN */
.main {
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#player {
    width:80%;
    height:420px;
    border:none;
}

.title {
    margin-bottom:10px;
    color:#fff;
}
</style>

</head>

<body>

<header>PANDA MUSIC 🎧</header>

<div class="container">

<div class="sidebar">
    <div class="searchBox">
        <input id="search" placeholder="Search English / Mandarin songs...">
    </div>
    <div id="list"></div>
</div>

<div class="main">
    <div class="title" id="title">Select a song</div>
    <iframe id="player" allow="autoplay"></iframe>
</div>

</div>

<script>
const API_KEY = "YOUR_API_KEY";

// 🔥 Query dibuat untuk menghasilkan banyak lagu (≈1000 hasil total)
const queries = [
    "top english songs 2025",
    "english hits playlist",
    "taylor swift hits",
    "billie eilish songs",
    "ed sheeran playlist",
    "top mandarin songs",
    "mandarin pop hits",
    "jay chou songs",
    "chinese pop music",
    "c-pop hits playlist"
];

let songs = [];

// 🎯 ambil dari YouTube API
async function fetchSongs(q) {
    const url =
    `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=50&q=${encodeURIComponent(q)}&key=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    return data.items.map(v => ({
        title: v.snippet.title,
        id: v.id.videoId
    }));
}

// 🔥 load banyak lagu (gabungan semua query)
async function loadSongs() {
    songs = [];

    for (let q of queries) {
        let result = await fetchSongs(q);
        songs = songs.concat(result);
    }

    render(songs);
}

// 🎵 render list
function render(list) {
    const box = document.getElementById("list");
    box.innerHTML = "";

    list.forEach(song => {
        let div = document.createElement("div");
        div.className = "song";
        div.textContent = song.title;

        div.onclick = () => play(song);

        box.appendChild(div);
    });
}

// ▶️ play video
function play(song) {
    document.getElementById("title").innerText = song.title;

    document.getElementById("player").src =
    `https://www.youtube.com/embed/${song.id}?autoplay=1`;
}

// 🔎 search
document.getElementById("search").addEventListener("input", (e) => {
    let val = e.target.value.toLowerCase();

    let filtered = songs.filter(s =>
        s.title.toLowerCase().includes(val)
    );

    render(filtered);
});

loadSongs();
</script>

</body>
</html>
