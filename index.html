<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PANDA Music Pro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      font-size: 20px;
      background: #111827;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 10px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin: 10px 0;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #results {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }

    .card {
      background: #1f2937;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
    }

    .card img {
      width: 100%;
    }

    .card p {
      font-size: 12px;
      padding: 5px;
    }

    #player {
      margin-top: 15px;
      width: 100%;
      aspect-ratio: 16/9;
    }
  </style>
</head>

<body>

<header>🐼 PANDA Music Pro</header>

<div class="app">

  <div class="search-box">
    <input id="query" placeholder="Cari lagu English / Mandarin..." />
    <button onclick="search()">Search</button>
  </div>

  <div id="player"></div>

  <div id="results"></div>

</div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
const API_KEY = "YOUR_YOUTUBE_API_KEY"; // 🔴 ganti ini

let player;
let currentVideoId = null;

function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    height: "360",
    width: "640",
    videoId: "",
    playerVars: {
      autoplay: 1,
      controls: 1,
      mute: 1, // 🔥 penting untuk autoplay
      playsinline: 1
    }
  });
}

// 🔍 SEARCH YOUTUBE REAL TIME
async function search() {
  const q = document.getElementById("query").value;

  const url =
    `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=12&q=${encodeURIComponent(q)}&key=${API_KEY}`;

  const res = await fetch(url);
  const data = await res.json();

  const results = document.getElementById("results");
  results.innerHTML = "";

  data.items.forEach(item => {
    const videoId = item.id.videoId;
    const title = item.snippet.title;
    const thumb = item.snippet.thumbnails.medium.url;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${thumb}" />
      <p>${title}</p>
    `;

    div.onclick = () => playVideo(videoId);

    results.appendChild(div);
  });
}

// ▶ PLAY VIDEO + AUTOPLAY
function playVideo(videoId) {
  currentVideoId = videoId;

  player.loadVideoById({
    videoId: videoId,
    suggestedQuality: "large"
  });

  player.mute(); // autoplay fix
  player.playVideo();
}
</script>

</body>
</html>
