<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PANDA Music Player</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: #111827;
    }

    .container {
      padding: 20px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    button:hover {
      background: #1d4ed8;
    }

    #player {
      margin-top: 20px;
    }

    .playlist-title {
      margin-top: 20px;
      font-size: 18px;
      color: #93c5fd;
    }
  </style>
</head>

<body>

<header>🐼 PANDA Music Player</header>

<div class="container">

  <div>
    <button onclick="loadPlaylist('english')">English Playlist</button>
    <button onclick="loadPlaylist('mandarin')">Mandarin Playlist</button>
  </div>

  <div class="playlist-title" id="title">Pilih Playlist</div>

  <div id="player"></div>

  <div>
    <button onclick="prevVideo()">⏮ Prev</button>
    <button onclick="nextVideo()">Next ⏭</button>
  </div>

</div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
  // Playlist video ID (ganti sesuai kebutuhan)
  const playlists = {
    english: [
      "3JZ_D3ELwOQ", // contoh: English song
      "fJ9rUzIMcZQ",
      "ktvTqknDobU"
    ],
    mandarin: [
      "2Vv-BfVoq4g", // contoh: Mandarin song (ganti sesuai)
      "EATpWcVvX0Q",
      "RgKAFK5djSk"
    ]
  };

  let player;
  let currentList = [];
  let currentIndex = 0;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '360',
      width: '640',
      videoId: '',
      playerVars: {
        autoplay: 0,
        controls: 1
      },
      events: {
        onStateChange: onPlayerStateChange
      }
    });
  }

  function loadPlaylist(type) {
    currentList = playlists[type];
    currentIndex = 0;

    document.getElementById("title").innerText =
      type === "english" ? "🎵 English Playlist" : "🎵 Mandarin Playlist";

    playVideo();
  }

  function playVideo() {
    const videoId = currentList[currentIndex];
    player.loadVideoById(videoId);
  }

  function nextVideo() {
    if (currentIndex < currentList.length - 1) {
      currentIndex++;
      playVideo();
    }
  }

  function prevVideo() {
    if (currentIndex > 0) {
      currentIndex--;
      playVideo();
    }
  }

  function onPlayerStateChange(event) {
    // Auto next saat video selesai
    if (event.data === YT.PlayerState.ENDED) {
      nextVideo();
    }
  }
</script>

</body>
</html>
