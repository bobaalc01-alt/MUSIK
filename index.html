<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PANDA Music YouTube</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

header {
    padding:15px;
    text-align:center;
    background:#181818;
    color:#1db954;
    font-size:22px;
    font-weight:bold;
}

.container {
    display:flex;
    height:100vh;
}

.sidebar {
    width:350px;
    background:#121212;
    overflow-y:auto;
    border-right:1px solid #333;
}

.search {
    padding:10px;
}

.search input {
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
}

.song {
    padding:10px;
    cursor:pointer;
    border-bottom:1px solid #222;
}

.song:hover {
    background:#1db954;
    color:black;
}

.main {
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

iframe {
    width:80%;
    height:400px;
    border:none;
}
</style>
</head>

<body>

<header>PANDA MUSIC 🎵 (YouTube Edition)</header>

<div class="container">

<div class="sidebar">
    <div class="search">
        <input id="searchBox" placeholder="Search YouTube music...">
    </div>
    <div id="list"></div>
</div>

<div class="main">
    <h2 id="title">Select a song</h2>
    <iframe id="player" allow="autoplay"></iframe>
</div>

</div>

<script>
const API_KEY = "YOUR_YOUTUBE_API_KEY";

// default playlist query (English + Mandarin Hits)
let queries = [
    "top english songs",
    "mandarin hits songs",
    "taylor swift",
    "billie eilish",
    "jay chou",
    "chinese pop songs"
];

let songs = [];

async function searchYouTube(query) {
    const url =
    `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=10&q=${query}&key=${API_KEY}`;

    let res = await fetch(url);
    let data = await res.json();

    return data.items.map(item => ({
        title: item.snippet.title,
        videoId: item.id.videoId
    }));
}

// load initial 100+ songs
async function loadAll() {
    songs = [];
    for (let q of queries) {
        let result = await searchYouTube(q);
        songs = songs.concat(result);
    }
    renderList(songs);
}

function renderList(list) {
    let box = document.getElementById("list");
    box.innerHTML = "";

    list.forEach(song => {
        let div = document.createElement("div");
        div.className = "song";
        div.innerText = song.title;

        div.onclick = () => {
            play(song);
        };

        box.appendChild(div);
    });
}

function play(song) {
    document.getElementById("title").innerText = song.title;

    document.getElementById("player").src =
    `https://www.youtube.com/embed/${song.videoId}?autoplay=1`;
}

// search filter
document.getElementById("searchBox").addEventListener("input", function(e) {
    let val = e.target.value.toLowerCase();
    let filtered = songs.filter(s =>
        s.title.toLowerCase().includes(val)
    );
    renderList(filtered);
});

loadAll();
</script>

</body>
</html>
