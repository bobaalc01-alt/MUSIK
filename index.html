<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Panda 🐼 Mandarin Hits</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#121212;
color:white;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#000;
padding:20px;
border-right:1px solid #222;
}

.logo{
font-size:25px;
font-weight:bold;
margin-bottom:30px;
}

.logo span{
color:#1db954;
}

.menu{
padding:12px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
color:#aaa;
transition:0.3s;
}

.menu:hover{
background:#1a1a1a;
color:white;
}

/* MAIN */

.main{
margin-left:230px;
padding:20px;
height:calc(100vh - 120px);
overflow:auto;
}

.title{
font-size:30px;
margin-bottom:20px;
color:#1db954;
}

.search{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#1e1e1e;
color:white;
margin-bottom:20px;
}

/* SONG */

.song{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#181818;
margin:10px 0;
border-radius:12px;
transition:0.3s;
cursor:pointer;
}

.song:hover{
background:#282828;
transform:scale(1.01);
}

.song-title{
font-size:16px;
font-weight:bold;
}

.song-artist{
font-size:13px;
color:#aaa;
margin-top:4px;
}

.badge{
display:inline-block;
margin-top:5px;
padding:4px 8px;
background:#1db954;
color:black;
font-size:10px;
border-radius:8px;
}

/* PLAYER */

.player{
position:fixed;
bottom:0;
left:230px;
right:0;
background:#181818;
padding:12px;
border-top:1px solid #333;
}

.controls{
display:flex;
gap:10px;
margin-top:10px;
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
background:#1db954;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

.now{
margin-bottom:10px;
font-size:14px;
}

.lyrics{
margin-top:10px;
font-size:14px;
color:#1db954;
}

/* MOBILE */

@media(max-width:700px){

.sidebar{
width:70px;
}

.logo{
font-size:14px;
}

.menu{
font-size:11px;
padding:8px;
}

.main{
margin-left:70px;
}

.player{
left:70px;
}

}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
🐼 Spotify <span>Panda</span>
</div>

<div class="menu">🏠 Home</div>
<div class="menu">🔥 Trending</div>
<div class="menu">🎵 Playlist</div>
<div class="menu">❤️ Favorite</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="title">
🐼 100 Mandarin Hits
</div>

<input
class="search"
id="search"
placeholder="Cari lagu mandarin..."
onkeyup="render()"
/>

<div id="list"></div>

</div>

<!-- PLAYER -->

<div class="player">

<div class="now" id="now">
🎧 Tidak ada lagu diputar
</div>

<audio id="audio" controls style="width:100%"></audio>

<div class="controls">

<button onclick="prev()">⏮</button>

<button onclick="toggle()">▶ / ⏸</button>

<button onclick="next()">⏭</button>

<button onclick="shuffle()">🔀 Shuffle</button>

</div>

<div class="lyrics" id="lyrics">
🎤 Lirik karaoke muncul di sini...
</div>

</div>

<script>

/* 🎵 DATABASE 100 LAGU */

const titles=[

"告白气球","稻香","青花瓷","七里香","光年之外",
"泡沫","那些年","大鱼","修炼爱情","十年",
"富士山下","遇见","突然好想你","年少有为","逆战",
"天下","达拉崩吧","有何不可","清明雨上","隐形的翅膀"

];

const artists=[

"Jay Chou",
"G.E.M.",
"JJ Lin",
"Hu Xia",
"Zhou Shen",
"Mayday",
"Eason Chan",
"Li Ronghao",
"Angela Chang",
"Xu Song"

];

const urls=[

"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3"

];

let songs=[];

for(let i=0;i<100;i++){

songs.push({

title:titles[i % titles.length]+" "+(i+1),

artist:artists[i % artists.length],

cat:"Mandarin",

url:urls[i % urls.length],

lyric:"🎤 Panda Mandarin Karaoke "+(i+1)

});

}

/* PLAYER */

let index=0;

function play(i){

index=i;

let s=songs[i];

let audio=document.getElementById("audio");

audio.src=s.url;

audio.load();

audio.play()
.then(()=>{

console.log("music playing");

})
.catch(err=>{

console.log(err);

alert("Klik tombol play browser");

});

document.getElementById("now").innerHTML=
"🎧 Now Playing: "+s.title+" - "+s.artist;

document.getElementById("lyrics").innerHTML=
s.lyric;

}

function toggle(){

let a=document.getElementById("audio");

a.paused ? a.play() : a.pause();

}

function next(){

index=(index+1)%songs.length;

play(index);

}

function prev(){

index=(index-1+songs.length)%songs.length;

play(index);

}

function shuffle(){

let r=Math.floor(Math.random()*songs.length);

play(r);

}

/* AUTO NEXT */

document.getElementById("audio")
.addEventListener("ended",()=>{

next();

});

/* RENDER */

function render(){

let list=document.getElementById("list");

let search=document
.getElementById("search")
.value.toLowerCase();

list.innerHTML="";

songs.forEach((s,i)=>{

if(

s.title.toLowerCase().includes(search)
||
s.artist.toLowerCase().includes(search)

){

let div=document.createElement("div");

div.className="song";

div.innerHTML=`

<div onclick="play(${i})">

<div class="song-title">
🎵 ${s.title}
</div>

<div class="song-artist">
${s.artist}
</div>

<div class="badge">
${s.cat}
</div>

</div>

<div>🐼</div>

`;

list.appendChild(div);

}

});

}

render();

</script>

</body>
</html>
