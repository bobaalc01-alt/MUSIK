<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PANDA MUSIC MP3 STYLE</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

header {
    background:#181818;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#1db954;
}

.container {
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar {
    width:340px;
    background:#121212;
    overflow-y:auto;
    border-right:1px solid #333;
}

.search {
    padding:10px;
}

.search input {
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
}

.song {
    padding:10px;
    cursor:pointer;
    border-bottom:1px solid #222;
}

.song:hover {
    background:#1db954;
    color:black;
}

/* MAIN PLAYER */
.main {
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.playerBox {
    width:80%;
    background:#181818;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

iframe {
    width:100%;
    height:360px;
    border:none;
    border-radius:10px;
}

#title {
    margin-bottom:10px;
}
</style>

</head>

<body>

<header>PANDA 🎧 MUSIC STREAM</header>

<div class="container">

<div class="sidebar">
    <div class="search">
        <input id="search" placeholder="Search English / Mandarin hits...">
    </div>
    <div id="list"></div>
</div>

<div class="main">
    <div class="playerBox">
        <div id="title">Select a song</div>
        <iframe id="player" allow="autoplay"></iframe>
    </div>
</div>

</div>

<script>
const API_KEY = "YOUR_YOUTUBE_API_KEY";

// 🔥 query untuk bikin ~1000 lagu dari API
const queries = [
    "english pop hits 2025",
    "top english songs playlist",
    "taylor swift hits playlist",
    "billie eilish songs",
    "ed sheeran best songs",
    "mandarin pop hits",
    "chinese songs playlist",
    "jay chou hits",
    "c-pop songs",
    "viral tiktok songs"
];

let songs = [];

// ambil dari YouTube
async function getSongs(q) {
    const url =
    `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=50&q=${encodeURIComponent(q)}&key=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    return data.items.map(v => ({
        title: v.snippet.title,
        id: v.id.videoId
    }));
}

// load semua lagu
async function loadAll() {
    songs = [];

    for (let q of queries) {
        let result = await getSongs(q);
        songs = songs.concat(result);
    }

    render(songs);
}

// tampilkan list
function render(list) {
    const box = document.getElementById("list");
    box.innerHTML = "";

    list.forEach(song => {
        let div = document.createElement("div");
        div.className = "song";
        div.textContent = song.title;

        div.onclick = () => play(song);

        box.appendChild(div);
    });
}

// play (MP3 STYLE FEEL = embedded video hidden player)
function play(song) {
    document.getElementById("title").innerText = song.title;

    document.getElementById("player").src =
    `https://www.youtube.com/embed/${song.id}?autoplay=1&controls=1`;
}

// search
document.getElementById("search").addEventListener("input", e => {
    let val = e.target.value.toLowerCase();

    let filtered = songs.filter(s =>
        s.title.toLowerCase().includes(val)
    );

    render(filtered);
});

loadAll();
</script>

</body>
</html>
