<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda Music 1000 🎧</title>

<script src="https://www.youtube.com/iframe_api"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:300px;
background:#000;
height:100vh;
overflow:auto;
padding:10px;
}

.title{
color:#1db954;
font-size:20px;
font-weight:bold;
padding:10px;
}

/* SONG ITEM */
.song{
padding:10px;
margin:5px 0;
background:#1e1e1e;
border-radius:8px;
cursor:pointer;
}

.song:hover{
background:#333;
}

/* PLAYER */
.main{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding:10px;
}

#player{
width:100%;
max-width:700px;
height:380px;
}

.controls{
margin-top:10px;
}

button{
background:#1db954;
border:none;
padding:10px;
margin:3px;
cursor:pointer;
font-weight:bold;
border-radius:8px;
}

/* SEARCH */
input{
width:90%;
padding:10px;
margin:10px;
border:none;
border-radius:8px;
}

.now{
margin:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="title">🐼 Panda Music 1000</div>

<input id="search" placeholder="Cari lagu..." onkeyup="render()">

<div id="list"></div>
</div>

<div class="main">

<div id="player"></div>

<div class="now" id="now">Tidak ada lagu</div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="next()">⏭</button>
<button onclick="shuffle()">🔀</button>
</div>

</div>

<script>

/* 🎵 YouTube VIDEO IDS (REAL MIX) */
let playlist = [
"dQw4w9WgXcQ","kJQP7kiw5Fk","JGwWNGJdvx8","OPf0YbXqDm0","RgKAFK5djSk",
"eYq7WapuDLU","3JZ_D3ELwOQ","YQHsXMglC9A","hT_nvWreIhg","fRh_vgS2dFE",
"60ItHLz5WEA","lWA2pjMjpBs","M7lc1UVf-VE","tAGnKpE4NCI","2Vv-BfVoq4g",
"kXYiU_JCYtU","lY2yjAdbvdQ","uelHwf8o7_U","CevxZvSJLk8","09R8_2nJtjg"
];

/* extend to 1000 songs */
while(playlist.length < 1000){
playlist.push(playlist[playlist.length % 20]);
}

let index = 0;
let player;

/* INIT */
function onYouTubeIframeAPIReady(){

player = new YT.Player("player",{

height:"380",
width:"100%",
videoId:playlist[index],

playerVars:{
autoplay:0,
controls:1,
rel:0,
modestbranding:1
},

events:{
"onStateChange":onStateChange
}

});

}

/* AUTO NEXT */
function onStateChange(e){
if(e.data === YT.PlayerState.ENDED){
next();
}
}

/* PLAY */
function play(i){
index = i;
player.loadVideoById(playlist[index]);

document.getElementById("now").innerText =
"🎧 Now Playing: Song #" + (i+1);
}

/* NEXT */
function next(){
index = (index + 1) % playlist.length;
play(index);
}

/* PREV */
function prev(){
index = (index - 1 + playlist.length) % playlist.length;
play(index);
}

/* SHUFFLE */
function shuffle(){
play(Math.floor(Math.random() * playlist.length));
}

/* RENDER LIST */
let list = document.getElementById("list");

function render(){
let search = document.getElementById("search").value.toLowerCase();
list.innerHTML = "";

for(let i=0;i<playlist.length;i++){

if(("song "+i).includes(search)){

let div = document.createElement("div");
div.className = "song";
div.innerHTML = "🎵 Song " + (i+1);
div.onclick = ()=>play(i);
list.appendChild(div);

}

}
}

render();

</script>

</body>
</html>
